name: sendlargefiles
description: "Share Large Video Files"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  dio: ^5.9.0
  pretty_dio_logger: ^1.4.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.3.0
  path_provider: ^2.1.5
  external_path: ^2.0.1
  get_storage: ^2.1.1
  file_picker: ^10.3.8
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  permission_handler: ^12.0.1
  app_links: ^7.0.0
  intl: ^0.20.2
  path: ^1.9.1
  google_fonts: ^6.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/app_icon.png

flutter:
  uses-material-design: true
  generate: true
